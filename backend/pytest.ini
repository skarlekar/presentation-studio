[pytest]
asyncio_mode = auto
testpaths = tests
addopts =
    --cov=.
    --cov-report=term-missing
    --cov-report=html:coverage_html
    --cov-fail-under=85
    -v
    --timeout=30
markers =
    unit: Pure unit tests with no I/O or network
    integration: Tests requiring a running FastAPI app
    e2e: Full pipeline tests requiring LLM mocks
    slow: Tests that take >5 seconds
